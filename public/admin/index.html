<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Administration — Chatterie Sciortino</title>
  <style>
    .build-notice {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      background: #3d2e25;
      color: #fbf5ec;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-top: 1px solid #6b9bc7;
    }
    .build-notice svg {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: #6b9bc7;
    }
    .build-notice .dismiss {
      background: none;
      border: 0;
      color: #b8a99a;
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      margin-left: 12px;
    }
    .build-notice .dismiss:hover { color: #fbf5ec; }
  </style>
</head>
<body>
  <div class="build-notice" id="build-notice">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span>Enregistrez vos brouillons librement. Chaque <strong>Publication</strong> déclenche une mise à jour du site (environ 2 minutes).</span>
    <button class="dismiss" onclick="document.getElementById('build-notice').remove()" aria-label="Fermer">&times;</button>
  </div>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.7.0/dist/decap-cms.js"></script>

  <script type="module">
    import { fr } from 'https://esm.sh/decap-cms-locales@3.5.1';
    const { CMS, initCMS } = window;
    CMS.registerLocale('fr', fr);
    initCMS();
  </script>
</body>
</html>
